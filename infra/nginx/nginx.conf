worker_processes auto;
events { worker_connections 4096; }

http {
  # Per-nginx-process counters.
  # TODO(prod): Redis-backed limiting (OpenResty/lua-resty-limit-req) once
  # nginx itself scales horizontally — these zones don't share state.
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api:20m  rate=300r/m;

  upstream gateway { server gateway:3000; keepalive 32; }
  upstream web     { server web:80;       keepalive 16; }

  server {
    listen 80;
    server_name _;

    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-Frame-Options        "DENY"                            always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Tight per-IP limits on credential endpoints (the gateway's
    # express-rate-limit adds a second, per-account-window layer).
    location ~ ^/api/auth/(login|register|refresh) {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # SSE — long-lived, no buffering.
    # TODO(prod): add sticky sessions (hash $cookie_access_token consistent)
    # when the gateway scales to multiple pods, until Redis pub/sub is wired
    # (see apps/gateway/src/sse.ts).
    location /api/seats/stream {
      proxy_pass http://gateway;
      proxy_set_header Host $host;
      proxy_set_header Connection '';
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
    }

    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else is the SPA (static bundle served by the web container).
    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
    }

    # TLS — uncomment for production (then set COOKIE_SECURE=true on auth-svc):
    # listen 443 ssl;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
  }
}
