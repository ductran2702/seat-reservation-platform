# Serves the built SPA inside the web container. All /api traffic is routed
# to the gateway by the edge nginx (infra/nginx/nginx.conf), never here.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: client-side routes (e.g. /login) resolve to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
