services:
  db:
    image: postgres:16-alpine
    container_name: seat_reservation_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: seat
      POSTGRES_PASSWORD: seat
      POSTGRES_DB: seat_reservation
    ports:
      - "5434:5432"
    volumes:
      - seat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seat -d seat_reservation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  seat_pgdata:
